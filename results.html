<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UVACO 個人化健康報告</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-50: #f0fdf4; --green-100: #dcfce7; --green-200: #bbf7d0;
      --green-400: #4ade80; --green-500: #22c55e; --green-600: #16a34a;
      --green-700: #15803d; --green-800: #166534;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563;
      --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
      --red-50: #fef2f2; --red-500: #ef4444; --red-600: #dc2626;
      --amber-50: #fffbeb; --amber-500: #f59e0b;
      --blue-50: #eff6ff; --blue-500: #3b82f6; --blue-600: #2563eb;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Hero Header ── */
    .hero {
      background: linear-gradient(135deg, var(--green-800) 0%, var(--green-600) 60%, var(--green-500) 100%);
      color: #fff;
      padding: 48px 24px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -40px;
      width: 240px; height: 240px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .hero-brand { font-size: 13px; font-weight: 700; letter-spacing: 0.25em; opacity: 0.8; margin-bottom: 12px; }
    .hero-name { font-size: clamp(28px, 5vw, 42px); font-weight: 900; margin-bottom: 6px; }
    .hero-sub { font-size: 14px; opacity: 0.75; margin-bottom: 32px; }
    .hero-score-ring {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 24px 40px;
      backdrop-filter: blur(8px);
    }
    .hero-score-num { font-size: 56px; font-weight: 900; line-height: 1; }
    .hero-score-label { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .hero-level-badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 24px;
      border-radius: 99px;
      font-size: 15px;
      font-weight: 700;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.3);
    }

    /* ── Layout ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px 80px;
      margin-top: -40px;
      position: relative;
      z-index: 1;
    }

    /* ── Section card ── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 20px;
    }
    .card-title .icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--green-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--green-600);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── A. Radar Chart ── */
    .radar-wrap {
      max-width: 400px;
      margin: 0 auto;
    }

    /* ── B. Health Scores Grid ── */
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .score-item {
      text-align: center;
      padding: 16px 8px;
      border-radius: 14px;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-100);
    }
    .score-item .s-num {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }
    .score-item .s-label {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 4px;
    }
    .score-bar {
      height: 4px;
      background: var(--gray-200);
      border-radius: 99px;
      margin-top: 8px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1s ease;
    }

    /* ── C. BMI Gauge ── */
    .bmi-gauge-wrap {
      position: relative;
      max-width: 340px;
      margin: 0 auto;
    }
    .bmi-center-label {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .bmi-num { font-size: 36px; font-weight: 900; color: var(--gray-800); line-height: 1; }
    .bmi-category { font-size: 14px; font-weight: 600; margin-top: 4px; }
    .bmi-scale {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 8px;
    }

    /* ── D. Risk Analysis ── */
    .risk-list { display: flex; flex-direction: column; gap: 12px; }
    .risk-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1.5px solid;
    }
    .risk-item.high { background: var(--red-50); border-color: #fca5a5; }
    .risk-item.medium { background: var(--amber-50); border-color: #fcd34d; }
    .risk-item.low { background: var(--blue-50); border-color: #bfdbfe; }
    .risk-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
    }
    .risk-item.high .risk-badge { background: #fca5a5; color: #dc2626; }
    .risk-item.medium .risk-badge { background: #fcd34d; color: #92400e; }
    .risk-item.low .risk-badge { background: #bfdbfe; color: #1e40af; }
    .risk-title { font-size: 14px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
    .risk-desc { font-size: 13px; color: var(--gray-500); line-height: 1.6; }

    /* ── E. Products ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .product-card {
      border: 1.5px solid var(--green-100);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(22,163,74,0.12); }
    .product-img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: var(--green-50);
      padding: 16px;
    }
    .product-img-placeholder {
      width: 100%;
      height: 180px;
      background: var(--green-50);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .product-body { padding: 16px; }
    .product-priority {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--green-100);
      color: var(--green-700);
      margin-bottom: 8px;
    }
    .product-name { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 6px; }
    .product-reason { font-size: 12px; color: var(--gray-500); line-height: 1.6; margin-bottom: 12px; }
    .product-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--green-100);
    }
    .product-price { font-size: 18px; font-weight: 900; color: var(--green-700); }
    .product-dosage { font-size: 11px; color: var(--gray-400); text-align: right; max-width: 60%; }

    /* ── F. Monthly Cost ── */
    .cost-breakdown { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .cost-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--gray-50);
      font-size: 14px;
    }
    .cost-row .name { color: var(--gray-600); }
    .cost-row .amount { font-weight: 700; color: var(--gray-800); }
    .cost-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 14px;
      border-radius: 14px;
      background: var(--green-600);
      color: #fff;
    }
    .cost-total .label { font-size: 15px; font-weight: 600; }
    .cost-total .total-num { font-size: 28px; font-weight: 900; }

    /* ── G. 90-Day Plan ── */
    .plan-phases { display: flex; flex-direction: column; gap: 0; }
    .phase-item {
      display: flex;
      gap: 0;
    }
    .phase-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 40px;
      flex-shrink: 0;
    }
    .phase-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--green-500);
      border: 3px solid var(--green-100);
      flex-shrink: 0;
      margin-top: 4px;
    }
    .phase-connector {
      width: 2px;
      flex: 1;
      background: var(--green-200);
      min-height: 40px;
      margin-top: 4px;
    }
    .phase-content {
      flex: 1;
      padding-bottom: 28px;
      padding-left: 8px;
    }
    .phase-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--green-700);
      background: var(--green-100);
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 8px;
    }
    .phase-title { font-size: 16px; font-weight: 700; color: var(--gray-800); margin-bottom: 6px; }
    .phase-products {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
    }
    .phase-product-tag {
      font-size: 12px;
      background: #fff;
      border: 1.5px solid var(--green-200);
      color: var(--green-700);
      padding: 4px 12px;
      border-radius: 99px;
      font-weight: 500;
    }
    .phase-lifestyle {
      font-size: 13px;
      color: var(--gray-500);
      line-height: 1.6;
      padding: 10px 14px;
      background: var(--gray-50);
      border-radius: 10px;
      border-left: 3px solid var(--green-400);
    }

    /* ── Summary text ── */
    .health-summary {
      font-size: 14px;
      line-height: 1.8;
      color: var(--gray-600);
      background: var(--green-50);
      border-radius: 14px;
      padding: 18px;
      border-left: 4px solid var(--green-500);
    }

    /* ── Loading state ── */
    .loading-state {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--green-50);
    }
    .spinner {
      width: 56px; height: 56px;
      border: 4px solid var(--green-100);
      border-top-color: var(--green-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error state ── */
    .error-state {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .btn-retry {
      padding: 12px 28px;
      background: var(--green-600);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    @media (max-width: 600px) {
      .scores-grid { grid-template-columns: repeat(3, 1fr); }
      .products-grid { grid-template-columns: 1fr; }
      .hero { padding: 36px 16px 64px; }
    }

    /* Print */
    @media print {
      .hero { background: var(--green-700) !important; -webkit-print-color-adjust: exact; }
      .card { break-inside: avoid; }
    }

    /* ── Plan Tabs ── */
    .plan-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .plan-tab {
      flex: 1; min-width: 100px; padding: 10px 14px;
      border: 2px solid var(--green-200); border-radius: 12px;
      background: #fff; color: var(--gray-600);
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.18s; text-align: center;
    }
    .plan-tab.active { border-color: var(--green-500); background: var(--green-50); color: var(--green-800); }
    .plan-tab:hover:not(.active) { border-color: #86efac; }
    .plan-panel { display: none; }
    .plan-panel.active { display: block; }
    .plan-panel-desc {
      font-size: 12px; color: var(--gray-500); margin-bottom: 14px;
      padding: 8px 12px; background: var(--green-50); border-radius: 8px;
    }
    /* ── Product category tag ── */
    .product-category {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      background: var(--green-100); color: var(--green-700); margin-bottom: 6px;
    }
    /* ── Ingredient / Benefit ── */
    .product-detail-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--green-100); }
    .product-detail-label { font-size: 11px; font-weight: 700; color: var(--green-700); margin-bottom: 3px; }
    .product-detail-text { font-size: 12px; color: var(--gray-600); line-height: 1.55; }
    /* ── Collapsible price ── */
    .price-toggle { margin-top: 12px; }
    .price-toggle summary {
      font-size: 12px; font-weight: 600; color: var(--green-600);
      cursor: pointer; padding: 6px 0; list-style: none;
      display: flex; align-items: center; gap: 5px;
    }
    .price-toggle summary::-webkit-details-marker { display: none; }
    .price-toggle summary::before { content: '▶'; font-size: 8px; transition: transform 0.2s; }
    .price-toggle[open] summary::before { transform: rotate(90deg); }
    .price-toggle-content {
      padding: 10px 12px; background: var(--gray-50);
      border-radius: 8px; margin-top: 6px; border: 1px solid var(--green-100);
    }
    .price-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
    .price-row:not(:last-child) { border-bottom: 1px solid var(--gray-100); }
    .price-row .p-label { color: var(--gray-500); }
    .price-row .p-val { font-weight: 700; color: var(--gray-800); }
    /* ── Plan cost bar ── */
    .plan-cost-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--green-800), var(--green-600));
      color: #fff; border-radius: 12px; margin-top: 16px;
    }
    .plan-cost-bar .pcb-monthly { font-size: 12px; font-weight: 500; opacity: 0.85; }
    .plan-cost-bar .pcb-monthly strong { display: block; font-size: 20px; font-weight: 800; margin-top: 2px; }
    .plan-cost-bar .pcb-daily { text-align: right; }
    .plan-cost-bar .pcb-daily-label { font-size: 11px; opacity: 0.75; }
    .plan-cost-bar .pcb-daily-num { font-size: 22px; font-weight: 900; }
    @media (max-width: 480px) {
      .plan-tab { font-size: 12px; padding: 8px 10px; }
      .plan-cost-bar .pcb-monthly strong { font-size: 17px; }
      .plan-cost-bar .pcb-daily-num { font-size: 18px; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading-state">
    <div class="spinner"></div>
    <p style="font-size:16px;font-weight:600;color:var(--green-700)">載入健康報告中…</p>
  </div>
</div>

  if (PRODUCT_DB[name]) return PRODUCT_DB[name];

    if (name.includes(key) || key.includes(name)) return PRODUCT_DB[key];
  }
  return null;
}

// ── Plan tab switcher ──
function showPlan(key, btn) {
  document.querySelectorAll('.plan-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.plan-panel').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const panel = document.getElementById('panel-' + key);
  if (panel) panel.classList.add('active');
}

// ── Score color ──
function scoreColor(n) {
  if (n >= 80) return '#16a34a';
  if (n >= 60) return '#22c55e';
  if (n >= 40) return '#f59e0b';
  return '#ef4444';
}

// ── BMI color ──
function bmiColor(cat) {
  const map = {
    '過輕': '#3b82f6', '正常': '#16a34a', '過重': '#f59e0b',
    '輕度肥胖': '#f97316', '中度肥胖': '#ef4444', '重度肥胖': '#dc2626'
  };
  return map[cat] || '#6b7280';
}

// ── Render ──
function render(data) {
  const {
    client_name = '親愛的朋友',
    health_scores = {},
    bmi = 0,
    bmi_category = '正常',
    overall_score = 0,
    overall_level = '',
    health_summary = '',
    risk_analysis = [],
    plans = null,
    action_plan_90 = []
  } = data;

  // 相容舊格式（recommended_products）→ 自動轉換成 plans 結構
  let resolvedPlans = plans;
  if (!resolvedPlans || !resolvedPlans.plan_a) {
    const prods = data.recommended_products || [];
    const total = data.total_monthly_cost || prods.reduce((s,p) => s + (p.monthly_cost||p.price||0), 0);

      plan_a: { label:'完整方案', products: prods, total_monthly_cost: total },

      <h1 class="hero-name">${client_name} 的健康分析</h1>
      <p class="hero-sub">由 AI 根據您的問卷數據生成 · 僅供保健參考</p>
      <div class="hero-score-ring">
        <span class="hero-score-num">${overall_score}</span>
        <span class="hero-score-label">綜合健康指數 / 100</span>
      </div>
      <div class="hero-level-badge">${overall_level}</div>
    </div>

    <div class="container">

      <!-- ── A. Radar Chart ── -->
      <div class="card">
        <div class="section-label">A · 健康雷達圖</div>
        <div class="card-title"><div class="icon">🎯</div>六大健康維度評估</div>
        <div class="radar-wrap">
          <canvas id="radarChart"></canvas>
        </div>
      </div>

      <!-- ── B. Score bars ── -->
      <div class="card">
        <div class="section-label">B · 綜合健康水平</div>
        <div class="card-title"><div class="icon">📊</div>各維度詳細得分</div>
        <div class="scores-grid" id="scoresGrid"></div>
        ${health_summary ? `<div class="health-summary" style="margin-top:20px">${health_summary}</div>` : ''}
      </div>

      <!-- ── C. BMI ── -->
      <div class="card">
        <div class="section-label">C · BMI 儀錶板</div>
        <div class="card-title"><div class="icon">⚖️</div>身體質量指數</div>
        <div class="bmi-gauge-wrap">
          <canvas id="bmiChart" height="200"></canvas>
          <div class="bmi-center-label">
            <div class="bmi-num" style="color:${bmiColor(bmi_category)}">${bmi}</div>
            <div class="bmi-category" style="color:${bmiColor(bmi_category)}">${bmi_category}</div>
          </div>
        </div>
        <div class="bmi-scale">
          <span>過輕 &lt;18.5</span>
          <span>正常 18.5-24</span>
          <span>過重 24-27</span>
          <span>肥胖 &gt;27</span>
        </div>
      </div>

      <!-- ── D. Risk Analysis ── -->
      <div class="card">
        <div class="section-label">D · 健康風險分析</div>
        <div class="card-title"><div class="icon">⚠️</div>可能的健康風險</div>
        <div class="risk-list" id="riskList"></div>
      </div>

      <!-- ── E. Products + Cost (三階方案) ── -->
      <div class="card">
        <div class="section-label">E · 個人化三階保健方案</div>
        <div class="card-title"><div class="icon">🌿</div>AI 精選適合您的保健品</div>
        <div class="plan-tabs">
          <button class="plan-tab active" onclick="showPlan('a',this)">🏆 完整方案</button>
          <button class="plan-tab" onclick="showPlan('b',this)">⚡ 中階方案</button>
          <button class="plan-tab" onclick="showPlan('c',this)">🌱 陽春方案</button>
        </div>
        <div class="plan-panel active" id="panel-a">
          <p class="plan-panel-desc">全方位調理，涵蓋所有健康維度，追求最佳保健效果</p>
          <div class="products-grid" id="productsGrid-a"></div>
          <div class="plan-cost-bar" id="costBar-a"></div>
        </div>
        <div class="plan-panel" id="panel-b">
          <p class="plan-panel-desc">針對您最需要改善的2-3個健康維度，平衡效果與預算</p>
          <div class="products-grid" id="productsGrid-b"></div>
          <div class="plan-cost-bar" id="costBar-b"></div>
        </div>
        <div class="plan-panel" id="panel-c">

    grid.appendChild(div);
  });

      datasets: [{

        borderWidth: 2.5,

        pointRadius: 5,
        pointHoverRadius: 7,
      }]
    },
    options: {
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { stepSize: 20, font: { size: 10 }, color: '#9ca3af' },

        circumference: 180,
        rotation: 270,

      cutout: '72%',

    risk_analysis.forEach(r => {
      const sevClass = r.severity === '高' ? 'high' : r.severity === '中' ? 'medium' : 'low';

  // ── Products (三階方案) ──
  function renderPlanPanel(planKey, planData) {
    const grid = document.getElementById(`productsGrid-${planKey}`);

    if (!grid || !planData) return;
    const products = planData.products || [];
    grid.innerHTML = '';
    products.forEach((p, i) => {
      const imgUrl = getProductImage(p.product_name);
      const imgHtml = imgUrl
        ? `<img class="product-img" src="${imgUrl}" alt="${p.product_name}" onerror="this.style.display='none'">`
        : `<div class="product-img-placeholder">🌿</div>`;
      const info = getProductInfo(p.product_name);
      const monthCost = p.monthly_cost || p.price || 0;
      const dailyCost = Math.round(monthCost / 30);
      const infoHtml = info ? `
        <div class="product-detail-section">
          <div class="product-detail-label">成分</div>
          <div class="product-detail-text">${info.ingredients}</div>
        </div>
        <div class="product-detail-section">
          <div class="product-detail-label">效益</div>
          <div class="product-detail-text">${info.benefits}</div>
        </div>
        ${info.warnings ? `<div class="product-detail-section"><div class="product-detail-text" style="color:#f59e0b">⚠️ ${info.warnings}</div></div>` : ''}
      ` : '';
      const div = document.createElement('div');
      div.className = 'product-card';
      div.innerHTML = `
        ${imgHtml}
        <div class="product-body">
          <span class="product-priority">優先 #${i + 1}</span>
          ${p.category ? `<span class="product-category">${p.category}</span>` : ''}
          <div class="product-name">${p.product_name}</div>
          <div class="product-reason">${p.reason || ''}</div>
          ${infoHtml}
          ${p.dosage ? `<div style="font-size:12px;color:var(--gray-500);margin-top:8px">📋 ${p.dosage}</div>` : ''}
          <details class="price-toggle">
            <summary>查看費用</summary>
            <div class="price-toggle-content">
              <div class="price-row"><span class="p-label">每月費用</span><span class="p-val">NT$ ${monthCost.toLocaleString()}</span></div>
              <div class="price-row"><span class="p-label">平均每日</span><span class="p-val">NT$ ${dailyCost}</span></div>
            </div>
          </details>
        </div>
      `;
      grid.appendChild(div);
    });
    // Cost bar
    const total = planData.total_monthly_cost || products.reduce((s,p) => s + (p.monthly_cost||p.price||0), 0);
    const dailyTotal = Math.round(total / 30);
    costBar.innerHTML = `
      <div class="pcb-monthly">每月預算<strong>NT$ ${total.toLocaleString()}</strong></div>
      <div class="pcb-daily">
        <div class="pcb-daily-label">每日平均</div>
        <div class="pcb-daily-num">NT$ ${dailyTotal}</div>
      </div>
    `;
  }

  ['a', 'b', 'c'].forEach(key => renderPlanPanel(key, resolvedPlans[`plan_${key}`]));

  // ── 90-Day Plan ──
  const planEl = document.getElementById('planPhases');
  action_plan_90.forEach((phase, i) => {
    const isLast = i === action_plan_90.length - 1;
    const div = document.createElement('div');
    div.className = 'phase-item';
    const products = Array.isArray(phase.products) ? phase.products : [];
    div.innerHTML = `
      <div class="phase-line">
        <div class="phase-dot"></div>
        ${!isLast ? '<div class="phase-connector"></div>' : ''}
      </div>
      <div class="phase-content">
        <span class="phase-tag">${phase.phase || '第 ' + (i+1) + ' 階段'}</span>
        <div class="phase-title">${phase.focus || ''}</div>
        <div class="phase-products">
          ${products.map(pr => `<span class="phase-product-tag">${pr}</span>`).join('')}
        </div>
        <div class="phase-lifestyle">💡 ${phase.lifestyle || ''}</div>
      </div>
    `;
    planEl.appendChild(div);
  });
}
