<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UVACO 個人化健康報告</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-50: #f0fdf4; --green-100: #dcfce7; --green-200: #bbf7d0;
      --green-400: #4ade80; --green-500: #22c55e; --green-600: #16a34a;
      --green-700: #15803d; --green-800: #166534;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563;
      --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
      --red-50: #fef2f2; --red-500: #ef4444; --red-600: #dc2626;
      --amber-50: #fffbeb; --amber-500: #f59e0b;
      --blue-50: #eff6ff; --blue-500: #3b82f6; --blue-600: #2563eb;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Hero Header ── */
    .hero {
      background: linear-gradient(135deg, var(--green-800) 0%, var(--green-600) 60%, var(--green-500) 100%);
      color: #fff;
      padding: 48px 24px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -40px;
      width: 240px; height: 240px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .hero-brand { font-size: 13px; font-weight: 700; letter-spacing: 0.25em; opacity: 0.8; margin-bottom: 12px; }
    .hero-name { font-size: clamp(28px, 5vw, 42px); font-weight: 900; margin-bottom: 6px; }
    .hero-sub { font-size: 14px; opacity: 0.75; margin-bottom: 32px; }
    .hero-score-ring {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 24px 40px;
      backdrop-filter: blur(8px);
    }
    .hero-score-num { font-size: 56px; font-weight: 900; line-height: 1; }
    .hero-score-label { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .hero-level-badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 24px;
      border-radius: 99px;
      font-size: 15px;
      font-weight: 700;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.3);
    }

    /* ── Layout ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px 80px;
      margin-top: -40px;
      position: relative;
      z-index: 1;
    }

    /* ── Section card ── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 20px;
    }
    .card-title .icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--green-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--green-600);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── A. Radar Chart ── */
    .radar-wrap {
      max-width: 400px;
      margin: 0 auto;
    }

    /* ── B. Health Scores Grid ── */
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .score-item {
      text-align: center;
      padding: 16px 8px;
      border-radius: 14px;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-100);
    }
    .score-item .s-num {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }
    .score-item .s-label {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 4px;
    }
    .score-bar {
      height: 4px;
      background: var(--gray-200);
      border-radius: 99px;
      margin-top: 8px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1s ease;
    }

    /* ── C. BMI Gauge ── */
    .bmi-gauge-wrap {
      position: relative;
      max-width: 340px;
      margin: 0 auto;
    }
    .bmi-center-label {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .bmi-num { font-size: 36px; font-weight: 900; color: var(--gray-800); line-height: 1; }
    .bmi-category { font-size: 14px; font-weight: 600; margin-top: 4px; }
    .bmi-scale {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 8px;
    }

    /* ── D. Risk Analysis ── */
    .risk-list { display: flex; flex-direction: column; gap: 12px; }
    .risk-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1.5px solid;
    }
    .risk-item.high { background: var(--red-50); border-color: #fca5a5; }
    .risk-item.medium { background: var(--amber-50); border-color: #fcd34d; }
    .risk-item.low { background: var(--blue-50); border-color: #bfdbfe; }
    .risk-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
    }
    .risk-item.high .risk-badge { background: #fca5a5; color: #dc2626; }
    .risk-item.medium .risk-badge { background: #fcd34d; color: #92400e; }
    .risk-item.low .risk-badge { background: #bfdbfe; color: #1e40af; }
    .risk-title { font-size: 14px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
    .risk-desc { font-size: 13px; color: var(--gray-500); line-height: 1.6; }

    /* ── E. Products ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .product-card {
      border: 1.5px solid var(--green-100);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(22,163,74,0.12); }
    .product-img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: var(--green-50);
      padding: 16px;
    }
    .product-img-placeholder {
      width: 100%;
      height: 180px;
      background: var(--green-50);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .product-body { padding: 16px; }
    .product-priority {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--green-100);
      color: var(--green-700);
      margin-bottom: 8px;
    }
    .product-name { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 6px; }
    .product-reason { font-size: 12px; color: var(--gray-500); line-height: 1.6; margin-bottom: 12px; }
    .product-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--green-100);
    }
    .product-price { font-size: 18px; font-weight: 900; color: var(--green-700); }
    .product-dosage { font-size: 11px; color: var(--gray-400); text-align: right; max-width: 60%; }

    /* ── F. Monthly Cost ── */
    .cost-breakdown { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .cost-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--gray-50);
      font-size: 14px;
    }
    .cost-row .name { color: var(--gray-600); }
    .cost-row .amount { font-weight: 700; color: var(--gray-800); }
    .cost-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 14px;
      border-radius: 14px;
      background: var(--green-600);
      color: #fff;
    }
    .cost-total .label { font-size: 15px; font-weight: 600; }
    .cost-total .total-num { font-size: 28px; font-weight: 900; }

    /* ── G. 90-Day Plan ── */
    .plan-phases { display: flex; flex-direction: column; gap: 0; }
    .phase-item {
      display: flex;
      gap: 0;
    }
    .phase-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 40px;
      flex-shrink: 0;
    }
    .phase-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--green-500);
      border: 3px solid var(--green-100);
      flex-shrink: 0;
      margin-top: 4px;
    }
    .phase-connector {
      width: 2px;
      flex: 1;
      background: var(--green-200);
      min-height: 40px;
      margin-top: 4px;
    }
    .phase-content {
      flex: 1;
      padding-bottom: 28px;
      padding-left: 8px;
    }
    .phase-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--green-700);
      background: var(--green-100);
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 8px;
    }
    .phase-title { font-size: 16px; font-weight: 700; color: var(--gray-800); margin-bottom: 6px; }
    .phase-products {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
    }
    .phase-product-tag {
      font-size: 12px;
      background: #fff;
      border: 1.5px solid var(--green-200);
      color: var(--green-700);
      padding: 4px 12px;
      border-radius: 99px;
      font-weight: 500;
    }
    .phase-lifestyle {
      font-size: 13px;
      color: var(--gray-500);
      line-height: 1.6;
      padding: 10px 14px;
      background: var(--gray-50);
      border-radius: 10px;
      border-left: 3px solid var(--green-400);
    }

    /* ── Summary text ── */
    .health-summary {
      font-size: 14px;
      line-height: 1.8;
      color: var(--gray-600);
      background: var(--green-50);
      border-radius: 14px;
      padding: 18px;
      border-left: 4px solid var(--green-500);
    }

    /* ── Loading state ── */
    .loading-state {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--green-50);
    }
    .spinner {
      width: 56px; height: 56px;
      border: 4px solid var(--green-100);
      border-top-color: var(--green-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error state ── */
    .error-state {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .btn-retry {
      padding: 12px 28px;
      background: var(--green-600);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    @media (max-width: 600px) {
      .scores-grid { grid-template-columns: repeat(3, 1fr); }
      .products-grid { grid-template-columns: 1fr; }
      .hero { padding: 36px 16px 64px; }
    }

    /* Print */
    @media print {
      .hero { background: var(--green-700) !important; -webkit-print-color-adjust: exact; }
      .card { break-inside: avoid; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading-state">
    <div class="spinner"></div>
    <p style="font-size:16px;font-weight:600;color:var(--green-700)">載入健康報告中…</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 產品圖片對應表
// 格式：'產品名稱': 'Google Drive 圖片直連 URL'
// 在 setup-guide.md 中說明如何填寫
// ═══════════════════════════════════════════════

  '康爾動':                      'https://lh3.googleusercontent.com/d/1SOvOCDb-kkxzjYk5y9DVTJ-sHwwHbyi8',

  '欣悅康':                      'https://lh3.googleusercontent.com/d/1-1fEmXxfLuogPLifpcXOXipJTTMZALrO',
  '艾逸膠囊 / 愛益膠囊':         'https://lh3.googleusercontent.com/d/18dS-8LjqMc9jEGGp-JwTUPwnQwOluutL',
  '艾逸':                        'https://lh3.googleusercontent.com/d/18dS-8LjqMc9jEGGp-JwTUPwnQwOluutL',
  '靚妍飲 (含玻尿酸)':           'https://lh3.googleusercontent.com/d/1gM_V1XpPtVUkhQzCMnDq6sJ7DJSMZUl9',
  '葡眾靚妍飲':                  'https://lh3.googleusercontent.com/d/1gM_V1XpPtVUkhQzCMnDq6sJ7DJSMZUl9',
  '995 生技營養品':              'https://lh3.googleusercontent.com/d/1ZE8806i-Vx-l6lqkxXARE4ZqbEIq0Hjk',
  '995生技營養品':               'https://lh3.googleusercontent.com/d/1ZE8806i-Vx-l6lqkxXARE4ZqbEIq0Hjk',
  '扶百生膠囊':                  'https://lh3.googleusercontent.com/d/1y1-kagPELB7-uwG2OgYZv_lbHv7ciIky',
  '扶百生':                      'https://lh3.googleusercontent.com/d/1y1-kagPELB7-uwG2OgYZv_lbHv7ciIky',

  '力盛':                        'https://lh3.googleusercontent.com/d/1u6wyabEnZ6RsAd1N59Pf_FdrV25Wqlcz',

  '貝力耐':                      'https://lh3.googleusercontent.com/d/1nRgpE25VQ4YDFayEjDy7xLfE4xtpybtc',
  '衛傑膠囊':                    'https://lh3.googleusercontent.com/d/1AbrUl7HV5Zf6BNG3xapOLisnYMWH4W0C',
  '衛傑':                        'https://lh3.googleusercontent.com/d/1AbrUl7HV5Zf6BNG3xapOLisnYMWH4W0C',
  '百克斯膠囊':                  'https://lh3.googleusercontent.com/d/1aCQceBCNBBWevV51rpyLVyPb2FY3uwBs',
  '百克斯':                      'https://lh3.googleusercontent.com/d/1aCQceBCNBBWevV51rpyLVyPb2FY3uwBs',
  '康貝寧':                      'https://lh3.googleusercontent.com/d/1rheY9ZtGBtbNrTsueI03i8vk8tby-UA0',
  '暢且利膠囊 + 福百生膠囊 (熟男黃金套組)': 'https://lh3.googleusercontent.com/d/1Zg_DD9xM557y-5tox4crH_tdhhIvXd84',
  '暢且利':                      'https://lh3.googleusercontent.com/d/1Zg_DD9xM557y-5tox4crH_tdhhIvXd84',
  '葡眾 360 計劃 大保養套組':     'https://lh3.googleusercontent.com/d/1lREqdZopPbA5krC2WtZk-YUG8clcHucA',
  '葡眾360計劃':                  'https://lh3.googleusercontent.com/d/1lREqdZopPbA5krC2WtZk-YUG8clcHucA',
};

function getProductImage(name) {
  // Try exact match first, then partial
  if (PRODUCT_IMAGES[name]) return PRODUCT_IMAGES[name];
  for (const key of Object.keys(PRODUCT_IMAGES)) {
    if (PRODUCT_IMAGES[key] && (name.includes(key) || key.includes(name))) {
      return PRODUCT_IMAGES[key];
    }
  }
  return '';
}

// ── Score color ──
function scoreColor(n) {
  if (n >= 80) return '#16a34a';
  if (n >= 60) return '#22c55e';
  if (n >= 40) return '#f59e0b';
  return '#ef4444';
}

// ── BMI color ──
function bmiColor(cat) {
  const map = {
    '過輕': '#3b82f6', '正常': '#16a34a', '過重': '#f59e0b',
    '輕度肥胖': '#f97316', '中度肥胖': '#ef4444', '重度肥胖': '#dc2626'
  };
  return map[cat] || '#6b7280';
}

// ── Render ──
function render(data) {
  const {
    client_name = '親愛的朋友',
    health_scores = {},
    bmi = 0,
    bmi_category = '正常',
    overall_score = 0,
    overall_level = '',
    health_summary = '',
    risk_analysis = [],
    recommended_products = [],
    total_monthly_cost = 0,
    action_plan_90 = []
  } = data;

  const scoreLabels = Object.keys(health_scores);
  const scoreValues = Object.values(health_scores);

  document.getElementById('app').innerHTML = `
    <!-- ── HERO ── -->
    <div class="hero">
      <p class="hero-brand">UVACO · 個人化健康智能報告</p>
      <h1 class="hero-name">${client_name} 的健康分析</h1>

      <div class="hero-score-ring">
        <span class="hero-score-num">${overall_score}</span>

      </div>
      <div class="hero-level-badge">${overall_level}</div>
    </div>

    <div class="container">

      <!-- ── A. Radar Chart ── -->
      <div class="card">
        <div class="section-label">A · 健康雷達圖</div>
        <div class="card-title"><div class="icon">🎯</div>六大健康維度評估</div>
        <div class="radar-wrap">
          <canvas id="radarChart"></canvas>
        </div>
      </div>

      <!-- ── B. Score bars ── -->
      <div class="card">
        <div class="section-label">B · 綜合健康水平</div>
        <div class="card-title"><div class="icon">📊</div>各維度詳細得分</div>
        <div class="scores-grid" id="scoresGrid"></div>
        ${health_summary ? `<div class="health-summary" style="margin-top:20px">${health_summary}</div>` : ''}
      </div>

      <!-- ── C. BMI ── -->
      <div class="card">
        <div class="section-label">C · BMI 儀錶板</div>
        <div class="card-title"><div class="icon">⚖️</div>身體質量指數</div>
        <div class="bmi-gauge-wrap">
          <canvas id="bmiChart" height="200"></canvas>
          <div class="bmi-center-label">
            <div class="bmi-num" style="color:${bmiColor(bmi_category)}">${bmi}</div>
            <div class="bmi-category" style="color:${bmiColor(bmi_category)}">${bmi_category}</div>
          </div>
        </div>
        <div class="bmi-scale">
          <span>過輕 &lt;18.5</span>
          <span>正常 18.5-24</span>
          <span>過重 24-27</span>
          <span>肥胖 &gt;27</span>
        </div>
      </div>

      <!-- ── D. Risk Analysis ── -->
      <div class="card">
        <div class="section-label">D · 健康風險分析</div>
        <div class="card-title"><div class="icon">⚠️</div>可能的健康風險</div>
        <div class="risk-list" id="riskList"></div>
      </div>

      <!-- ── E. Products ── -->
      <div class="card">
        <div class="section-label">E · 個人化產品推薦</div>
        <div class="card-title"><div class="icon">🌿</div>AI 精選適合您的保健品</div>
        <div class="products-grid" id="productsGrid"></div>
      </div>

      <!-- ── F. Monthly Cost ── -->
      <div class="card">
        <div class="section-label">F · 每月預算規劃</div>
        <div class="card-title"><div class="icon">💰</div>建議每月消費費用</div>
        <div class="cost-breakdown" id="costBreakdown"></div>
        <div class="cost-total">
          <span class="label">每月建議總預算</span>

        </div>

        </p>
      </div>

      <!-- ── G. 90-Day Plan ── -->
      <div class="card">
        <div class="section-label">G · 90 天行動計劃</div>
        <div class="card-title"><div class="icon">🗓</div>分階段健康提升策略</div>
        <div class="plan-phases" id="planPhases"></div>
      </div>

      <!-- Footer -->
      <div style="text-align:center;padding:24px 0;color:var(--gray-400);font-size:12px">
        <p>本報告由 UVACO 健康智能系統生成，僅供保健參考，不代替醫療診斷。</p>
        <p style="margin-top:4px">如有重大健康疑慮，請諮詢專業醫師。</p>
        <button onclick="window.print()" style="margin-top:16px;padding:10px 24px;border:1.5px solid var(--green-200);border-radius:10px;background:#fff;color:var(--green-700);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">🖨 列印 / 儲存 PDF</button>
        <button onclick="window.location.href='questionnaire.html'" style="margin-top:16px;margin-left:12px;padding:10px 24px;border:none;border-radius:10px;background:var(--green-600);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">重新填寫問卷</button>

  // ── Render score bars ──
  const grid = document.getElementById('scoresGrid');
  scoreLabels.forEach((label, i) => {
    const val = scoreValues[i];
    const color = scoreColor(val);
    const div = document.createElement('div');
    div.className = 'score-item';
    div.innerHTML = `
      <div class="s-num" style="color:${color}">${val}</div>
      <div class="s-label">${label}</div>
      <div class="score-bar"><div class="score-bar-fill" style="width:${val}%;background:${color}"></div></div>

    grid.appendChild(div);
  });

  // ── Radar Chart ──
  const radarCtx = document.getElementById('radarChart').getContext('2d');
  new Chart(radarCtx, {
    type: 'radar',
    data: {
      labels: scoreLabels,
      datasets: [{
        label: '健康指數',
        data: scoreValues,
        backgroundColor: 'rgba(34,197,94,0.15)',
        borderColor: '#16a34a',
        borderWidth: 2.5,
        pointBackgroundColor: '#16a34a',
        pointRadius: 5,
        pointHoverRadius: 7,
      }]
    },
    options: {
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { stepSize: 20, font: { size: 10 }, color: '#9ca3af' },
          grid: { color: '#e5e7eb' },
          pointLabels: { font: { size: 12, weight: '600' }, color: '#374151' }
        }
      },
      plugins: { legend: { display: false } }
    }
  });

  // ── BMI Gauge (Doughnut) ──
  const bmiVal = parseFloat(bmi) || 22;
  const bmiPct = Math.min(Math.max((bmiVal - 10) / (45 - 10), 0), 1);
  const angle = bmiPct * 180; // degrees in semicircle
  const bmiCtx = document.getElementById('bmiChart').getContext('2d');
  new Chart(bmiCtx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [bmiPct * 100, 100 - bmiPct * 100],
        backgroundColor: [bmiColor(bmi_category), '#f3f4f6'],
        borderWidth: 0,
        circumference: 180,
        rotation: 270,
      }]
    },
    options: {
      cutout: '72%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });

  // ── Risk list ──
  const riskList = document.getElementById('riskList');
  if (risk_analysis.length === 0) {
    riskList.innerHTML = '<p style="color:var(--green-600);font-weight:600;text-align:center;padding:20px">🎉 目前未偵測到明顯健康風險，繼續保持！</p>';
  } else {
    risk_analysis.forEach(r => {
      const sevClass = r.severity === '高' ? 'high' : r.severity === '中' ? 'medium' : 'low';
      const div = document.createElement('div');
      div.className = `risk-item ${sevClass}`;
      div.innerHTML = `
        <div>
          <span class="risk-badge">${r.severity}風險</span>
          <div class="risk-title">${r.risk}</div>
          <div class="risk-desc">${r.description}</div>
        </div>
      `;
      riskList.appendChild(div);
    });
  }

  // ── Products ──
  const prodGrid = document.getElementById('productsGrid');
  recommended_products.forEach((p, i) => {
    const imgUrl = getProductImage(p.product_name);
    const imgHtml = imgUrl
      ? `<img class="product-img" src="${imgUrl}" alt="${p.product_name}" onerror="this.style.display='none'">`
      : `<div class="product-img-placeholder">🌿</div>`;
    const div = document.createElement('div');
    div.className = 'product-card';
    div.innerHTML = `
      ${imgHtml}
      <div class="product-body">
        <span class="product-priority">優先 #${i + 1}</span>
        <div class="product-name">${p.product_name}</div>
        <div class="product-reason">${p.reason || ''}</div>
        <div class="product-meta">
          <div class="product-price">NT$ ${(p.price || 0).toLocaleString()}</div>
          <div class="product-dosage">${p.dosage || ''}</div>
        </div>
      </div>
    `;
    prodGrid.appendChild(div);
  });

  // ── Cost breakdown ──
  const costBreakdown = document.getElementById('costBreakdown');
  recommended_products.forEach(p => {
    const div = document.createElement('div');
    div.className = 'cost-row';
    div.innerHTML = `
      <span class="name">${p.product_name}</span>
      <span class="amount">NT$ ${((p.monthly_cost || p.price) || 0).toLocaleString()}</span>
    `;
    costBreakdown.appendChild(div);
  });

  // ── 90-Day Plan ──
  const planEl = document.getElementById('planPhases');
  action_plan_90.forEach((phase, i) => {
    const isLast = i === action_plan_90.length - 1;
    const div = document.createElement('div');
    div.className = 'phase-item';
    const products = Array.isArray(phase.products) ? phase.products : [];
    div.innerHTML = `
      <div class="phase-line">
        <div class="phase-dot"></div>
        ${!isLast ? '<div class="phase-connector"></div>' : ''}
      </div>
      <div class="phase-content">
        <span class="phase-tag">${phase.phase || '第 ' + (i+1) + ' 階段'}</span>
        <div class="phase-title">${phase.focus || ''}</div>
        <div class="phase-products">
          ${products.map(pr => `<span class="phase-product-tag">${pr}</span>`).join('')}
        </div>
        <div class="phase-lifestyle">💡 ${phase.lifestyle || ''}</div>
      </div>
    `;
    planEl.appendChild(div);
  });
}

        { phase: '第9-13週：鞏固期', focus: '全面鞏固成果，體質根本改造', products: ['所有推薦產品'], lifestyle: '維持良好習慣，每3個月重新評估健康狀態' }
      ]
    };
    render(demo);

  }

  try {
    const json = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(encoded)))));
